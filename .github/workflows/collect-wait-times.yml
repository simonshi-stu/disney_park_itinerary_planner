name: Collect wait times

on:
  workflow_dispatch:
  repository_dispatch:
    types: [collect-wait-times]
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: collect-wait-times
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Collect Queue Times snapshots
        env:
          MIN_SNAPSHOT_INTERVAL_MINUTES: "5"
        run: node scripts/collect-wait-times.mjs
      - name: Commit updated wait-time data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Collect wait-time snapshot"
          file_pattern: data/wait_times/*.csv data/wait_times/latest_snapshot.json
