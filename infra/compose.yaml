services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: itinerary_planner
      POSTGRES_USER: itinerary_planner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itinerary_planner -d itinerary_planner"]
      interval: 5s
      timeout: 3s
      retries: 20

  raw-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - raw-storage-data:/data

volumes:
  postgres-data:
  raw-storage-data:
